<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship TDD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🚢 BATTLESHIP 🚢</h1>
        <p>Click on the enemy board to launch a strike!</p>
    </header>

    <main class="game-container">
        <section class="board-wrapper">
            <h2>Your Fleet</h2>
            <div id="human-board" class="grid-board"></div>
        </section>

        <section class="board-wrapper">
            <h2>Enemy Waters</h2>
            <div id="computer-board" class="grid-board"></div>
        </section>
    </main>

    <script type="module" src="index.js"></script>
</body>
</html>
