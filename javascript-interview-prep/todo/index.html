<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="domController.js" defer></script>
</head>
<body>

    <div id="app-layout" style="display: flex; gap: 20px; padding: 20px;">
        
        <aside id="sidebar-container" style="width: 250px; border-right: 1px solid #ccc; padding-right: 20px;">
            <h2>Projects</h2>
            <button id="add-project-btn">+ New Project</button>
            
            <div id="projects-list" style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;"></div>
        </aside>

        <main id="main-content" style="flex: 1;">
            <h1 id="current-project-title">Project: Default</h1>
            <button id="add-todo-btn">+ Add New Task</button>

            <div id="tasks-list" style="margin-top: 20px; display: flex; flex-direction: column; gap: 12px;"></div>
        </main>
    </div>
    <div id="todo-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
        
        <div style="background: white; padding: 20px; border-radius: 8px; width: 300px; display: flex; flex-direction: column; gap: 15px;">
            <h3>Add New Task</h3>
            
            <form id="todo-form" style="display: flex; flex-direction: column; gap: 10px;">
                <label>Title: <input type="text" id="form-task-title" required></label>
                <label>Description: <textarea id="form-task-desc" required></textarea></label>
                
                <label>Priority: 
                    <select id="form-task-priority">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </label>
                
                <label>Due Date: <input type="date" id="form-task-date" required></label>
                
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                    <button type="button" id="close-modal-btn">Cancel</button>
                    <button type="submit">Add Task</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
